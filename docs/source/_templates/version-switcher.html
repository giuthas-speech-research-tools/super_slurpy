<div class="version-switcher" style="padding: 1rem 0; border-bottom: 1px solid var(--color-sidebar-brand-text);">
    <label for="version-select" style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 0.5rem;">Documentation Version:</label>
    <select id="version-select" style="width: 100%; padding: 0.4rem; border-radius: 4px; background-color: var(--color-sidebar-background); color: var(--color-sidebar-text); border: 1px solid var(--color-sidebar-item-background--hover);">
        <option value="latest">latest (development)</option>
        </select>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const select = document.getElementById("version-select");
    const repo = "giuthas-speech-research-tools/super_slurpy"; 

    // Figure out the current version from the URL path
    const pathParts = window.location.pathname.split('/');
    const repoIndex = pathParts.indexOf("super_slurpy");
    
    let currentVersion = "latest";
    if (repoIndex !== -1 && pathParts.length > repoIndex + 1) {
        const potentialVersion = pathParts[repoIndex + 1];
        if (potentialVersion && !potentialVersion.endsWith('.html')) {
            currentVersion = potentialVersion;
        }
    }

    // Helper function to filter out versions older than 0.5.0-alpha.8
    function isSupportedVersion(tagName) {
        const cleanTag = tagName.replace(/^v/, '');
        
        // Split into the core version (0.5.0) and the prerelease part (alpha.7)
        const [coreVersion, ...prereleaseParts] = cleanTag.split('-');
        const prerelease = prereleaseParts.join('-'); 
        
        const parts = coreVersion.split('.').map(Number);
        const major = parts[0] || 0;
        const minor = parts[1] || 0;
        const patch = parts[2] || 0;
        
        // 1. Any major version > 0 is supported
        if (major > 0) return true;
        
        // 2. We are in 0.x.x series
        if (minor > 5) return true;
        if (minor < 5) return false;
        
        // 3. We are exactly in 0.5.x series
        if (patch > 0) return true; // e.g. 0.5.1 passes
        
        // 4. We are exactly at 0.5.0
        // If there is no pre-release tag, it's the stable 0.5.0, which is supported
        if (!prerelease) return true;
        
        // 5. It's a 0.5.0 pre-release (e.g., alpha.7, beta.1)
        if (prerelease.startsWith('alpha')) {
            // Extract the number after alpha (e.g., 'alpha.7' -> 7)
            const alphaNumMatch = prerelease.match(/alpha\.?(\d+)/);
            if (alphaNumMatch) {
                const alphaNum = parseInt(alphaNumMatch[1], 10);
                if (alphaNum <= 7) return false; // Exclude alpha.7 and before
            }
        }
        
        // If it's beta, rc, or an alpha >= 8, it is supported!
        return true;
    }

    // Fetch tags dynamically from GitHub API
    fetch(`https://api.github.com/repos/${repo}/tags`)
        .then(response => response.json())
        .then(tags => {
            tags.forEach(tag => {
                if (isSupportedVersion(tag.name)) {
                    const option = document.createElement("option");
                    option.value = tag.name;
                    
                    // Add (stable) or (pre-release) indicator
                    const isPreRelease = tag.name.includes('-');
                    const label = isPreRelease ? " (pre-release)" : " (stable)";
                    
                    option.text = tag.name + label;
                    select.appendChild(option);
                }
            });
            
            // Set the current version as the selected option
            if (Array.from(select.options).some(opt => opt.value === currentVersion)) {
                select.value = currentVersion;
            } else {
                const fallbackOption = document.createElement("option");
                fallbackOption.value = currentVersion;
                
                const isFallbackPreRelease = currentVersion.includes('-');
                const fallbackLabel = (currentVersion !== "latest") ? 
                    (isFallbackPreRelease ? " (pre-release)" : " (stable)") : "";
                
                fallbackOption.text = currentVersion + fallbackLabel;
                select.appendChild(fallbackOption);
                select.value = currentVersion;
            }
        })
        .catch(err => console.error("Could not load versions from GitHub", err));

    // Handle navigation when a new version is selected
    select.addEventListener("change", function() {
        const selectedVersion = this.value;
        if (selectedVersion !== currentVersion) {
            const newPathParts = [...pathParts];
            if (repoIndex !== -1 && newPathParts.length > repoIndex + 1) {
                newPathParts[repoIndex + 1] = selectedVersion;
                window.location.href = window.location.origin + newPathParts.join('/');
            }
        }
    });
});
</script>
