# Configuration for slurpy GUI and algorithms.

gui:
  # Specify either an absolute frame number (int)
  # or a proportional position (float 0.0 to 1.0)
  default_frame: null
  proportional_frame: 0.5

# Should the current frame's spline be used 
# to track the current frame. If true the spline
# will be updated, if false, it will be left as is. 
apply_tracking_to_current_frame: true

# Snake algorithm defaults
snake:
  alpha: 0.1
  lambda1: 0.5
  band_penalty: 10.0

# Particle filter defaults
particle:
  num_particles: 50
  percent_var: 0.98
  noise_scale: 1.0